{% extends "base.html" %}
{% block title %}LCP商管 · 用户管理{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">👥 用户管理</h1>
    <button class="btn btn-primary" onclick="openModal('userModal')">+ 新增用户</button>
</div>

<div class="card">
    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>用户名</th><th>角色</th><th>所属项目</th><th>操作</th></tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td><strong>{{ u.用户名 }}</strong></td>
                    <td>{{ u.角色 }}</td>
                    <td>{{ u.所属项目 or '全部（集团）' }}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-outline btn-sm" onclick="editUser('{{ u.用户名 }}','{{ u.角色 }}','{{ u.所属项目 }}')">编辑</button>
                            <a href="/admin/users/delete/{{ u.用户名 }}" class="btn btn-danger btn-sm"
                               onclick="return confirm('确定删除用户 {{ u.用户名 }}？')">删除</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- 新增/编辑 Modal -->
<div class="modal-overlay" id="userModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('userModal')">✕</button>
        <h3 id="userModalTitle">新增用户</h3>
        <form method="POST" action="/admin/users/add">
            <div class="form-grid">
                <div class="form-group"><label>用户名 *</label><input name="用户名" id="userName" required></div>
                <div class="form-group"><label>密码</label><input name="密码" id="userPwd" type="password" placeholder="留空则不变"></div>
                <div class="form-group"><label>角色 *</label>
                    <select name="角色" id="userRole" required>
                        {% for r in roles %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>所属项目</label>
                    <select name="所属项目" id="userProject">
                        <option value="">全部（集团）</option>
                        {% for p in projects %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn btn-outline" onclick="closeModal('userModal')">取消</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function editUser(name, role, project) {
    document.getElementById('userModalTitle').textContent = '编辑用户 - ' + name;
    document.getElementById('userName').value = name;
    document.getElementById('userName').readOnly = true;
    document.getElementById('userPwd').value = '';
    document.getElementById('userRole').value = role;
    document.getElementById('userProject').value = project;
    openModal('userModal');
}
</script>
{% endblock %}
