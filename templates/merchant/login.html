<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商户门户 — 丰盛云商商管</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-box{background:#fff;border-radius:12px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-box h1{text-align:center;color:#333;margin-bottom:4px;font-size:22px}
  .login-box .sub{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
  .tab-bar{display:flex;border-bottom:2px solid #eee;margin-bottom:20px}
  .tab-bar span{flex:1;text-align:center;padding:10px 0;font-size:15px;color:#999;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab-bar span.active{color:#667eea;border-bottom-color:#667eea;font-weight:600}
  .alert{padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:14px}
  .alert-error{background:#fdf0f0;color:#c0392b;border:1px solid #f5c6cb}
  .alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
  form label{display:block;margin-bottom:4px;font-size:14px;color:#555;font-weight:600}
  form input{width:100%;padding:11px 14px;border:1px solid #d0d8e4;border-radius:8px;font-size:15px;margin-bottom:14px;color:#333}
  form input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
  .btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
  .btn:hover{opacity:.9}
  .form-panel{display:none}
  .form-panel.active{display:block}
  .hint{font-size:12px;color:#999;margin-top:-10px;margin-bottom:14px}
  .forgot-link{text-align:center;margin-top:14px;font-size:13px}
  .forgot-link a{color:#667eea;text-decoration:none}
  .forgot-link a:hover{text-decoration:underline}

  /* 弹窗遮罩 */
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-box{background:#fff;border-radius:12px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative}
  .modal-box h2{text-align:center;font-size:18px;color:#333;margin-bottom:20px}
  .modal-close{position:absolute;top:12px;right:16px;font-size:22px;color:#999;cursor:pointer;border:none;background:none;line-height:1}
  .modal-close:hover{color:#333}
</style>
</head>
<body>
<div class="login-box">
  <h1>丰盛云商商管</h1>
  <div class="sub">商户门户</div>

  <div class="tab-bar">
    <span class="active" onclick="switchTab('login')">登 录</span>
    <span onclick="switchTab('register')">注 册</span>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="alert alert-success">{{ success }}</div>
  {% endif %}

  <!-- 登录表单 -->
  <div id="login-panel" class="form-panel active">
    <form method="post" action="{{ url_for('merchant_login_page') }}">
      <label>用户名</label>
      <input type="text" name="username" placeholder="请输入用户名" required autocomplete="off">

      <label>密码</label>
      <input type="password" name="password" placeholder="请输入密码" required>

      <button class="btn" type="submit">登 录</button>
    </form>
    <div class="forgot-link"><a href="javascript:void(0)" onclick="openResetModal()">忘记密码？</a></div>
  </div>

  <!-- 注册表单 -->
  <div id="register-panel" class="form-panel">
    <form method="post" action="{{ url_for('merchant_register') }}">
      <label>合同号 <span style="font-weight:400;color:#999;font-size:12px">（用于验证商户身份）</span></label>
      <input type="text" name="contract_no" placeholder="请输入合同号" required autocomplete="off">

      <label>商户名称 <span style="font-weight:400;color:#999;font-size:12px">（用于验证商户身份）</span></label>
      <input type="text" name="merchant_name" placeholder="请输入商户名称" required autocomplete="off">

      <label>用户名</label>
      <input type="text" name="username" placeholder="请设置用户名" required autocomplete="off">

      <label>设置密码</label>
      <input type="password" name="password" placeholder="请设置登录密码（至少6位）" required>
      <div class="hint">密码长度至少6位</div>

      <label>确认密码</label>
      <input type="password" name="confirm_password" placeholder="请再次输入密码" required>

      <button class="btn" type="submit">注 册</button>
    </form>
  </div>
</div>

<!-- 找回密码弹窗 -->
<div id="reset-modal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeResetModal()">&times;</button>
    <h2>找回密码</h2>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('merchant_reset_password') }}">
      <label>合同号</label>
      <input type="text" name="contract_no" placeholder="请输入合同号" required autocomplete="off">

      <label>商户名称</label>
      <input type="text" name="merchant_name" placeholder="请输入商户名称" required autocomplete="off">

      <label>新密码</label>
      <input type="password" name="password" placeholder="请设置新密码（至少6位）" required>
      <div class="hint">密码长度至少6位</div>

      <label>确认新密码</label>
      <input type="password" name="confirm_password" placeholder="请再次输入新密码" required>

      <button class="btn" type="submit">重置密码</button>
    </form>
  </div>
</div>

<script>
var activeTab = 'login';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-bar span').forEach(function(el, i) {
    el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('login-panel').classList.toggle('active', tab === 'login');
  document.getElementById('register-panel').classList.toggle('active', tab === 'register');
}

function openResetModal() {
  document.getElementById('reset-modal').classList.add('show');
}

function closeResetModal() {
  document.getElementById('reset-modal').classList.remove('show');
}

// 点击遮罩关闭
document.getElementById('reset-modal').addEventListener('click', function(e) {
  if (e.target === this) closeResetModal();
});

{% if show_tab %}
switchTab('{{ show_tab }}');
{% endif %}

{% if show_reset %}
openResetModal();
{% endif %}
</script>
</body>
</html>
